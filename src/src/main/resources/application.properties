# 1. THE SMART DATABASE BRIDGE
# Syntax: ${SECRET_VARIABLE:fallback_if_not_found}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/genshin_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

# 2. HIBERNATE & JPA SETTINGS
# 'update' ensures the cloud database creates your tables automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 3. CONNECTION POOLING (Essential for Cloud Stability)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# 4. VIEW SETTINGS
spring.jpa.open-in-view=false